server:
  port: 8081
spring:
  application:
    name: loom-rates-sentinel
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:nomad_db}
    username: ${DB_USER:nomad_user}
    password: ${DB_PASS:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

parser:
  nbk:
    url: https://nationalbank.kz/ru/exchangerates/ezhednevnye-oficialnye-rynochnye-kursy-valyut
  xe:
    url-template: https://www.xe.com/currencyconverter/convert/?Amount=1&From=%s&To=KZT